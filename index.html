<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="text-font" src="/assets/fonts/HankenGrotesk-VariableFont_wght.ttf" />

  <link rel="text-font" src="/assets/fonts/static/HankenGrotesk-Medium.ttf" />
  <link rel="text-font" src="/assets/fonts/static/HankenGrotesk-Bold.ttf" />
  <link rel="text-font" src="assets/fonts/static/HankenGrotesk-ExtraBold.ttf" />
  <title>Results Summary Component</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="root">

  <div class="card">

    <div class="card_result">

      <h3 class="result_title">Your Result</h3>
      <div class="result_score">

        <span class="score">76</span>
        <span class="total">of 100</span>
      </div>

      <div class="detail_wrapper">

        <h3 class="message">
          Great
        </h3>

        <p class="details">
          You scored higher than 65% of the people who have taken these tests.
        </p>


      </div>


    </div>

    <div class="card_summary">
      <h3 class="summary_title">Summary</h3>

      <div class="items_wrapper">
        <!-- Reaction -->
        <div class="items reaction_item">
          <div class="title_icon">
            <div class="item_icon">
              <img src="assets/images/icon-reaction.svg" alt="reaction icon" padding="0.4rem" />
            </div>
            <h3 class="reaction_title">Reaction</h3>
          </div>
          <div class="item_texts">
            <span class="score_value">80</span>
            <span class="total_score"> / 100</span>
            </span>
          </div>
        </div>
        
        <!-- Memory -->
        <div class="items memory_item">
          <div class="title_icon">
            <div class="memory-icon"><img src="assets/images/icon-memory.svg" padding="0.4rem"></div>
            <h3 class="memory_title">Memory</h3>
          </div>
          <div class="item_texts">
            <span class="score_value">92</span>
            <span class="total_score"> / 100</span>
        
          </div>
        </div>
        
        <!-- Verbal -->
        <div class="items verbal_item">
          <div class="title_icon">
            <div class="verbal-icon"><img src="assets/images/icon-verbal.svg" padding="0.4rem"></div>
            <h3 class="verbal_title">Verbal</h3>
          </div>
          <div class="item_texts">
            <span class="score_value">61</span>
            <span class="total_score"> / 100</span>
          </div>
        </div>
        <!-- Visual -->
        <div class="items visual_item">
          <div class="title_icon">
            <div class="visual-icon"><img src="assets/images/icon-visual.svg" padding="0.4rem"></div>
            <h3 class="visual_title">Visual</h3>
          </div>
          <div class="item_texts">
            <span class="score_value">73</span>
            <span class="total_score"> / 100</span>
          </div>
        </div>
      </div>


      <button class="btn">Continue</button>


    </div>


</body>


</html>


</html>
